<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon says</title>
    <link rel="stylesheet" href="simon.css">
    <script src="simon.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/0b23e1ba8c.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="userInterface">
        <div id="scoreBoard">
            <div id="result">
                <div id="closeInHighScore"><i class="fa-regular fa-circle-xmark"></i></div>
                <p class="para">YOUR HIGH SCORE</p>
                <p id="finalScore">0</p>
            </div>
        </div>
    </div>
        <main>
            <header>
                <h1><span style="color: #FF4136;">S</span><span style="color: #0074D9;">I</span><span
                        style="color: #2ECC40;">M</span><span style="color: #FFDC00;">O</span><span
                        style="color: #FFFFFF;">N</span> <span style="color: #FF4136;">S</span><span
                        style="color: #0074D9;">A</span><span style="color: #2ECC40;">Y</span><span
                        style="color: #FFDC00;">S</span></h1>
            </header>
            <div id="options">
                <a
                    href="https://vinothbaskar-026oc5s4-8443.zcodecorp.in/HTML%20PROJECTS/java%20script/Mini%20project/logic.html"><button type="button"
                        id="play">PLAY</button></a>
                <button type="button" id="help">HELP</button>
                <button type="button" id="highScore">HIGH SCORE</button>
                <a href="https://www.factmonster.com/games"
                    target="_blank"><button type="button" id="moreGames">MORE GAMES</button></a>
            </div>
        </main>

















    <div id="helpInfo">
        <div id="helpShow">
            <div id="section1">
                <h2 class="head">HOW TO PLAY</h2>
                <p class="para">Click on the colored buttons in the correct order by repeating the pattern the computer
                    is
                    playing.</p>
            </div>
            <div id="section2">
                <div id="main">
                    <section>
                        <div id="sample">
                            <div id="box_green"></div>
                            <div id="box_red"></div>
                            <div id="box_yellow"></div>
                            <div id="box_blue"></div>
                        </div>
                    </section>
                    <div id="currentScore">
                        <p id="userScore">0</p>
                    </div>
                </div>
            </div>
            <div id="btn">
                <button type="button" id="back_Btn" class="btn_back">BACK</button>
            </div>
        </div>
    </div>
</body>
</html>
